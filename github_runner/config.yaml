name: "GitHub Self-Hosted Runner"
description: "Run a GitHub Actions self-hosted runner as a Home Assistant add-on"
version: "1.0.5"
slug: "github_runner"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
options:
  repo_url: ""
  runner_token: ""
  runner_name: "hassio-runner"
  labels: "self-hosted,hassio"
  runner_group: "Default"
  work_dir: "_work"
  replace_existing: true
  packages: []
schema:
  repo_url: str
  runner_token: str
  runner_name: str
  labels: str
  runner_group: str
  work_dir: str
  replace_existing: bool
  packages:
    - str
